<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | Book Store Online</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header"></header>
<div class="page-title">
<div class="container">
<h1>Shopping Cart</h1>
<div class="breadcrumb"><a href="index.html">Home</a> &gt; Cart</div>
</div>
</div>
<div class="container">
<div class="cart-container" id="cartContainer"></div>
</div>
<footer class="site-footer"></footer>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
function renderCart() {
const cart = Cart.get();
const container = document.getElementById('cartContainer');
if (cart.length === 0) {
container.innerHTML = `
<div class="empty-cart" style="grid-column: 1 / -1;">
<div class="empty-cart-icon"></div>
<h2>Your cart is empty</h2>
<p style="color: var(--dark-gray); margin-bottom: 24px;">Looks like you haven't added any books yet.</p>
<a href="catalog.html" class="btn btn-primary">Start Shopping</a>
</div>
`;
return;
}
const subtotal = Cart.getTotal();
const shipping = subtotal > 450 ? 0 : 60;
const total = subtotal + shipping;
container.innerHTML = `
<div class="cart-items">
<div class="cart-header">
<span>Product</span>
<span>Price</span>
<span>Quantity</span>
<span>Total</span>
<span></span>
</div>
<div id="cartItemsList">
${cart.map(item => `
<div class="cart-item">
<div class="cart-item-product">
<img src="${item.cover}" alt="${item.title}">
<div>
<div class="cart-item-name">${item.title}</div>
<div class="cart-item-author">${item.author}</div>
</div>
</div>
<span style="font-weight: 600;">${formatPrice(item.price)}</span>
<div class="quantity-selector" style="transform: scale(0.85); transform-origin: left;">
<button onclick="Cart.updateQuantity(${item.bookId}, -1); renderCart();">-</button>
<input type="text" value="${item.quantity}" readonly style="width: 40px;">
<button onclick="Cart.updateQuantity(${item.bookId}, 1); renderCart();">+</button>
</div>
<span style="font-weight: 700;">${formatPrice(item.price * item.quantity)}</span>
<button class="remove-btn" onclick="Cart.remove(${item.bookId}); renderCart();">Remove</button>
</div>
`).join('')}
</div>
<div style="margin-top: 20px;">
<a href="catalog.html" class="btn btn-outline btn-sm">&larr; Continue Shopping</a>
</div>
</div>
<div class="cart-summary">
<h3>Order Summary</h3>
<div class="summary-row">
<span>Subtotal (${cart.reduce((s,i)=>s+i.quantity,0)} items)</span>
<span>${formatPrice(subtotal)}</span>
</div>
<div class="summary-row">
<span>Shipping</span>
<span style="color: ${shipping === 0 ? 'var(--success)' : ''};">${shipping === 0 ? 'FREE' : formatPrice(shipping)}</span>
</div>
${shipping > 0 ? `<div class="summary-row" style="font-size: 0.85rem; color: var(--success);"><span colspan="2">Add R${(450 - subtotal).toFixed(2)} more for FREE delivery!</span></div>` : ''}
<div class="summary-row total">
<span>TOTAL</span>
<span>${formatPrice(total)}</span>
</div>
<a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 16px;">Proceed to Checkout &rarr;</a>
<p style="text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--mid-gray);">Secure Checkout</p>
</div>
`;
}
document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
