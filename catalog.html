<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Catalogue | Book Store Online</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header"></header>
<!-- Page Title -->
<div class="page-title"></div>
<!-- Filters -->
<div class="filters-bar">
<div class="container">
<form class="filters-form" onchange="applyFilters()">
<select id="categoryFilter">
<option value="">All Categories</option>
</select>
<select id="sortFilter">
<option value="featured">Featured</option>
<option value="price-low">Price: Low to High</option>
<option value="price-high">Price: High to Low</option>
<option value="rating">Highest Rated</option>
<option value="name">Name A-Z</option>
</select>
<select id="formatFilter">
<option value="">All Formats</option>
<option value="Paperback">Paperback</option>
<option value="Hardcover">Hardcover</option>
<option value="Board Book">Board Book</option>
</select>
</form>
</div>
</div>
<!-- Results -->
<section class="section">
<div class="container">
<p id="resultsCount" style="color: var(--dark-gray); margin-bottom: 20px;"></p>
<div class="book-grid" id="catalogGrid"></div>
<div id="noResults" class="text-center" style="display:none; padding: 60px;">
<div style="font-size: 4rem; margin-bottom: 20px;"></div>
<h3>No books found</h3>
<p style="color: var(--dark-gray);">Try adjusting your search or filters.</p>
</div>
</div>
</section>
<section class="newsletter" style="margin-top: 40px;">
<div class="container">
<h2>Get Notified of New Arrivals</h2>
<p>Subscribe to be the first to know about new books and special offers.</p>
<form class="newsletter-form" onsubmit="event.preventDefault(); showToast('Subscribed!', 'success'); this.reset();">
<input type="email" placeholder="Enter your email" required>
<button type="submit" class="btn">Subscribe</button>
</form>
</div>
</section>
<footer class="site-footer"></footer>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
let currentBooks = [...BOOKS];

document.addEventListener('DOMContentLoaded', async () => {
  // Load categories from API
  let categories = CATEGORIES;
  try {
    const apiCategories = await API.getCategories();
    if (apiCategories && apiCategories.length > 0) {
      categories = apiCategories.map(c => ({
        id: c.category_id,
        name: c.name
      }));
    }
  } catch (err) {
    console.log('Using local categories');
  }

  // Populate category filter
  const catSelect = document.getElementById('categoryFilter');
  categories.forEach(cat => {
    catSelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
  });

  // Load books from API
  try {
    const apiBooks = await API.getBooks();
    if (apiBooks && apiBooks.length > 0) {
      currentBooks = apiBooks.map(b => ({
        id: b.book_id,
        title: b.title,
        author: b.author,
        isbn: b.isbn,
        price: b.price,
        stock: b.stock_quantity,
        categoryId: b.category_id,
        description: b.description,
        publisher: b.publisher,
        year: b.publication_year,
        pages: b.page_count,
        format: b.format,
        cover: b.cover_image,
        rating: b.rating_average,
        reviewCount: b.rating_count,
        isBestseller: b.is_bestseller === 1,
        isNewArrival: b.is_new_arrival === 1
      }));
    }
  } catch (err) {
    console.log('Using local books');
    currentBooks = [...BOOKS];
  }

  // Parse URL params
  const params = new URLSearchParams(window.location.search);
  const catId = params.get('cat');
  const search = params.get('search');

  if (catId) {
    document.getElementById('categoryFilter').value = catId;
    const cat = getCategoryById(catId) || categories.find(c => c.id === parseInt(catId));
    renderPageTitle(cat ? cat.name : 'Books', `<a href="index.html">Home</a> &gt; ${cat ? cat.name : 'Books'}`);
  } else if (search) {
    document.getElementById('searchInput').value = search;
    renderPageTitle(`Search: "${search}"`, `<a href="index.html">Home</a> &gt; Search Results`);
  } else {
    renderPageTitle('Book Catalogue', '<a href="index.html">Home</a> &gt; All Books');
  }

  applyFilters();
});

function applyFilters() {
  const catId = document.getElementById('categoryFilter').value;
  const sort = document.getElementById('sortFilter').value;
  const format = document.getElementById('formatFilter').value;
  const params = new URLSearchParams(window.location.search);
  const search = params.get('search');

  let books = [...currentBooks];

  // Category filter
  if (catId) {
    books = books.filter(b => b.categoryId === parseInt(catId));
  }

  // Search filter - now includes ISBN
  if (search) {
    const q = search.toLowerCase();
    books = books.filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q) ||
      (b.isbn && b.isbn.toLowerCase().includes(q))
    );
  }

  // Format filter
  if (format) {
    books = books.filter(b => b.format === format);
  }

  // Sort
  switch (sort) {
    case 'price-low': books.sort((a, b) => a.price - b.price); break;
    case 'price-high': books.sort((a, b) => b.price - a.price); break;
    case 'rating': books.sort((a, b) => b.rating - a.rating); break;
    case 'name': books.sort((a, b) => a.title.localeCompare(b.title)); break;
  }

  // Update UI
  document.getElementById('resultsCount').textContent = `Showing ${books.length} book${books.length !== 1 ? 's' : ''}`;

  if (books.length === 0) {
    document.getElementById('catalogGrid').style.display = 'none';
    document.getElementById('noResults').style.display = 'block';
  } else {
    document.getElementById('catalogGrid').style.display = 'grid';
    document.getElementById('noResults').style.display = 'none';
    document.getElementById('catalogGrid').innerHTML = books.map(renderBookCard).join('');
  }
}
</script>
</body>
</html>
